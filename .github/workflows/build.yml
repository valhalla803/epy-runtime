name: Build Wheels

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenSSL on Windows
        if: runner.os == 'Windows'
        run: choco install openssl -y

      - name: Install cibuildwheel
        run: python -m pip install -U pip cibuildwheel==2.19.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          
          CIBW_SKIP: "*-win32 *-i686 *musllinux*"
          
          CIBW_ARCHS_MACOS: auto

          CIBW_BEFORE_ALL_LINUX: >
            yum install -y openssl-devel zlib-devel

          CIBW_BEFORE_ALL_MACOS: >
            brew install openssl@3 zlib || true

          CIBW_ENVIRONMENT_WINDOWS: >
            INCLUDE="C:\\Program Files\\OpenSSL-Win64\\include"
            LIB="C:\\Program Files\\OpenSSL-Win64\\lib"

          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=13.0
            CPPFLAGS="-I$(brew --prefix openssl@3)/include"
            LDFLAGS="-L$(brew --prefix openssl@3)/lib"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl