name: Build Wheels

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.19.1
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*cp38* *musllinux_* *win32 *i686"
          CIBW_BUILD_VERBOSITY: "2"
          CIBW_DEBUG_TRACEBACK: "1"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34
          CIBW_ENVIRONMENT_WINDOWS: "INCLUDE=C:\\vcpkg\\installed\\x64-windows\\include LIB=C:\\vcpkg\\installed\\x64-windows\\lib"

          CIBW_BEFORE_ALL_WINDOWS: "vcpkg install openssl:x64-windows zlib:x64-windows"
          CIBW_ARCHS_MACOS: "arm64 x86_64"

          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=13.0"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl