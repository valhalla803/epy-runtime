name: Build Wheels for All Systems

on:
  push:
    branches:
      - main

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl zlib

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install openssl:x64-windows zlib:x64-windows
          cd C:\vcpkg\installed\x64-windows\lib
          if (Test-Path "zlibd.lib") { Copy-Item "zlibd.lib" -Destination "zlib.lib" -ErrorAction SilentlyContinue }
          if (Test-Path "zlib1.lib") { Copy-Item "zlib1.lib" -Destination "zlib.lib" -ErrorAction SilentlyContinue }
          if (Test-Path "zdll.lib") { Copy-Item "zdll.lib" -Destination "zlib.lib" -ErrorAction SilentlyContinue }

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.19.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-i686"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: "dnf install -y openssl-devel zlib-devel || yum install -y openssl-devel zlib-devel"
          CIBW_ENVIRONMENT_MACOS: CFLAGS="-I/opt/homebrew/opt/openssl/include -I/usr/local/opt/openssl/include" LDFLAGS="-L/opt/homebrew/opt/openssl/lib -L/usr/local/opt/openssl/lib"
          CIBW_ENVIRONMENT_WINDOWS: INCLUDE="C:\\vcpkg\\installed\\x64-windows\\include;$INCLUDE" LIB="C:\\vcpkg\\installed\\x64-windows\\lib;$LIB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epy-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl