name: Build Wheels for All Systems

on:
  push:
    branches:
      - main

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl zlib

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.19.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-i686"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34
          CIBW_BEFORE_ALL_LINUX: "dnf install -y openssl-devel zlib-devel"
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET="15.0" CFLAGS="-I/opt/homebrew/opt/openssl/include -I/usr/local/opt/openssl/include" LDFLAGS="-L/opt/homebrew/opt/openssl/lib -L/usr/local/opt/openssl/lib"
          CIBW_BEFORE_ALL_WINDOWS: "vcpkg install openssl:x64-windows zlib:x64-windows && cd C:\\vcpkg\\installed\\x64-windows\\lib && (if exist zlib1.lib copy zlib1.lib zlib.lib) && (if exist zlibd.lib copy zlibd.lib zlib.lib) && (if exist zdll.lib copy zdll.lib zlib.lib)"
          CIBW_ENVIRONMENT_WINDOWS: INCLUDE="C:\\vcpkg\\installed\\x64-windows\\include;$INCLUDE" LIB="C:\\vcpkg\\installed\\x64-windows\\lib;$LIB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epy-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl