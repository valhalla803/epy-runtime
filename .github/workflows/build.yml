name: Build Wheels

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Windows Deps
        if: runner.os == 'Windows'
        run: vcpkg install openssl:x64-windows zlib:x64-windows

      - name: Install macOS Deps
        if: runner.os == 'macOS'
        run: brew install openssl@3 zlib || true

      - name: Install cibuildwheel
        run: python -m pip install -U pip cibuildwheel==2.19.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          
          CIBW_SKIP: "*-win32 *-i686 *musllinux*"
          
          CIBW_ARCHS_MACOS: native

          CIBW_ENVIRONMENT_WINDOWS: >
            INCLUDE="C:\\vcpkg\\installed\\x64-windows\\include"
            LIB="C:\\vcpkg\\installed\\x64-windows\\lib"

          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=13.0
            CPPFLAGS="-I/opt/homebrew/opt/openssl@3/include -I/usr/local/opt/openssl@3/include"
            LDFLAGS="-L/opt/homebrew/opt/openssl@3/lib -L/usr/local/opt/openssl@3/lib"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl